# Permanent old-name residue guard for the self-evolution_data_agent project.
# Fails the build if the pre-rename project name reappears on any in-scope surface.
name: name-guard

on:
  pull_request:
    branches: [master, main]
  push:
    branches:
      - master
      - main
      - 'feature/**'
      - 'fix/**'

jobs:
  name-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Old-name residue guard
        run: |
          # Fail on any in-scope occurrence of the old project name.
          # prod-rename complete: the prod DB now uses the new name, so the former
          # carve-outs (pg_dump line, *.env.prod.example) are gone. Only genuinely
          # immutable surfaces remain excluded:
          #   - CHANGELOG.md : historical record, must not be rewritten
          #   - name-guard.yml : contains the pattern definition itself (self-match)
          #   - docs/ : spec history (rename ADRs legitimately cite the old name)
          hits=$(grep -rn "intelligent[_-]statistics\|Intelligent Statistics\|智能统计" . \
            --exclude-dir=.git \
            --exclude-dir=docs \
            --exclude-dir=.deploy \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=tmp \
            --exclude-dir=playwright-report \
            --exclude-dir=.playwright-mcp \
            --exclude=CHANGELOG.md \
            --exclude=name-guard.yml \
            || true)
          if [ -n "$hits" ]; then
            echo "❌ old project name reappeared in-scope:"; echo "$hits"; exit 1
          fi
          echo "✅ no in-scope old-name residue"
