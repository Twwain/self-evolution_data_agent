name: test

on:
  pull_request:
    branches: [master, main]
  push:
    branches:
      - master
      - main
      - 'feature/**'
      - 'fix/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: self_evolution_data_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IS_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/self_evolution_data_agent_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install .[dev]

      - name: Run all tests
        working-directory: backend
        run: pytest --tb=short
